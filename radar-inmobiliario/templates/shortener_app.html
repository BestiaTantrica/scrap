<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Short — El acortador de los Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0a0e1a;--accent:#38bdf8;--text:#f1f5f9;--muted:#64748b}
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
        .card{background:#111827;padding:40px;border-radius:20px;border:1px solid #1e2d40;max-width:500px;width:100%;text-align:center}
        h1{font-size:2rem;font-weight:900;margin-bottom:10px;color:var(--accent)}
        p{color:var(--muted);margin-bottom:30px}
        input{width:100%;padding:15px;background:#0a0e1a;border:1px solid #1e2d40;border-radius:10px;color:white;font-size:1rem;margin-bottom:15px;outline:none}
        input:focus{border-color:var(--accent)}
        button{width:100%;padding:15px;background:var(--accent);border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:1rem;transition:0.2s}
        button:hover{filter:brightness(1.1);transform:translateY(-2px)}
        #result{margin-top:20px;padding:15px;background:rgba(56,189,248,0.1);border-radius:10px;display:none}
        .short-url{color:var(--accent);font-weight:700;text-decoration:none;font-size:1.2rem}
    </style>
</head>
<body>
    <div class="card">
        <h1>🦅 RADAR SHORT</h1>
        <p>Convertí tus links pesados en slugs Base62 profesionales.</p>
        <input type="text" id="longUrl" placeholder="Pegá tu URL larga acá...">
        <button onclick="shorten()">GENERAR LINK CORTO</button>
        <div id="result">
            <p style="margin-bottom:10px;font-size:0.8rem">Tu link comprimido:</p>
            <a href="#" id="shortLink" class="short-url" target="_blank"></a>
        </div>
    </div>

    <script>
        async function shorten() {
            const url = document.getElementById('longUrl').value;
            if(!url) return;
            const res = await fetch('/api/shorten', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url})
            });
            const data = await res.json();
            if(data.short_url) {
                document.getElementById('result').style.display = 'block';
                const link = document.getElementById('shortLink');
                link.href = data.short_url;
                link.textContent = data.short_url;
            }
        }
    </script>
</body>
</html>
