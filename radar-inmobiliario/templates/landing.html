<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR ALPHA | INTELIGENCIA DE ARBITRAJE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030305; --accent: #00f2ff; --gold: #ffcc00; --text: #fff; --card: #0a0a0f; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; }
        .section { padding: 60px 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid #1a1a25; }
        .btn-accent { background: var(--accent); color: #000; padding: 18px 40px; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; display: inline-block; width: 100%; text-decoration: none; text-align: center; }
        
        .teaser-item { background: #0d0d16; border: 1px solid #222; padding: 25px; border-radius: 15px; margin-bottom: 25px; border-left: 5px solid var(--accent); }
        .evidence-tag { font-family: 'JetBrains Mono'; font-size: 0.65rem; background: rgba(0,242,255,0.1); color: var(--accent); padding: 2px 6px; border-radius: 4px; margin-right: 5px; }
        
        #loading-overlay { display: none; text-align: center; padding: 40px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<section class="section" style="text-align:center; padding-top:100px;">
    <h1 style="font-size:3.5rem; font-weight:900;">RADAR<span>ALPHA</span></h1>
    <p style="opacity:0.6;">Cruce Masivo de Datos & Análisis Inmobiliario.</p>
</section>

<!-- EL TEASER DE CAPTURA -->
<section class="section" id="teaser">
    <div class="card" style="border: 2px solid var(--accent);">
        <h2 style="font-size:2rem; margin-bottom:10px;">🛡️ Dossier de Oportunidades</h2>
        <p style="opacity:0.7;">Dejanos tu WhatsApp para recibir el reporte de cruce de datos en tiempo real.</p>
        
        <div id="form-container" style="display:grid; gap:15px; margin-top:30px;">
            <input type="text" id="zona_lead" placeholder="Zona de interés (ej: Palermo)" style="padding:15px; border-radius:10px; border:1px solid #333; background:#000; color:#fff;">
            <input type="text" id="whatsapp_lead" placeholder="Tu WhatsApp (con código de área)" style="padding:15px; border-radius:10px; border:1px solid #333; background:#000; color:#fff;">
            <button class="btn-accent" onclick="captarLead()">GENERAR REPORTE AHORA</button>
        </div>

        <div id="loading-overlay">
            <div class="spinner"></div>
            <p id="loading-text" style="font-family:'JetBrains Mono'; font-size:0.8rem; color:var(--accent);">Cruzando datos con BORA...</p>
        </div>
        
        <div id="teaser-results" style="display:none; margin-top:40px; text-align:left;">
            <div id="results-list"></div>
            <div style="text-align:center; margin-top:30px;">
                <button class="btn-accent" style="width:auto;" onclick="pagar('diario', 1500)">DESBLOQUEAR CONTACTOS PRO ($1.500)</button>
            </div>
        </div>
    </div>
</section>

<!-- TRIPLE OFERTA -->
<section class="section">
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px;">
        <div class="card" style="text-align:center;">
            <h3>EL DIARIO</h3>
            <div style="font-size:2.5rem; color:var(--accent); margin:15px 0;">$1.500</div>
            <button class="btn-accent" onclick="pagar('diario', 1500)">COMPRAR AHORA</button>
        </div>
        <div class="card" style="text-align:center;">
            <h3>TRIAL SEMANAL</h3>
            <div style="font-size:2.5rem; margin:15px 0;">$5.000</div>
            <button class="btn-accent" style="background:#333; color:#fff;" onclick="pagar('semanal', 5000)">PROBAR SEMANA</button>
        </div>
        <div class="card" style="text-align:center; border-color:var(--gold);">
            <h3 style="color:var(--gold);">RADAR PRO</h3>
            <div style="font-size:2.5rem; color:var(--gold); margin:15px 0;">$15.000</div>
            <button class="btn-accent" style="background:var(--gold);" onclick="pagar('mensual', 15000)">SUSCRIBIRME PRO</button>
        </div>
    </div>
</section>

<script>
async function captarLead() {
    const zona = document.getElementById('zona_lead').value;
    const wa = document.getElementById('whatsapp_lead').value;
    if(!zona || !wa) return alert("Completá zona y WhatsApp");
    
    document.getElementById('form-container').style.display = "none";
    const overlay = document.getElementById('loading-overlay');
    const lText = document.getElementById('loading-text');
    overlay.style.display = "block";
    
    const steps = ["Cruzando datos con BORA...", "Escaneando Zonaprop y Argenprop...", "Validando Z-Score en zona...", "Generando Reporte de Arbitraje..."];
    let i = 0;
    const interval = setInterval(() => {
        lText.innerText = steps[i];
        i++;
        if(i >= steps.length) clearInterval(interval);
    }, 800);

    try {
        const res = await fetch(`/api/oportunidades_teaser?zona=${zona}&whatsapp=${wa}`);
        const data = await res.json();
        setTimeout(() => {
            overlay.style.display = "none";
            const list = document.getElementById('results-list');
            list.innerHTML = "";
            data.forEach(op => {
                let evidenceHtml = op.evidencia.map(e => `<span class="evidence-tag">✓ ${e}</span>`).join('');
                list.innerHTML += `
                    <div class="teaser-item">
                        <div style="margin-bottom:10px;">${evidenceHtml}</div>
                        <div style="display:flex; justify-content:space-between;">
                            <span style="font-size:0.8rem; opacity:0.6;">Detección Radar</span>
                            <span style="color:var(--accent); font-weight:bold;">${op.desvio}</span>
                        </div>
                        <div style="font-size:1.5rem; font-weight:900; color:var(--gold);">${op.valor}</div>
                        <div style="background:rgba(255,255,255,0.03); padding:10px; border-radius:8px; margin-top:10px; font-size:0.9rem;">${op.ia_analysis}</div>
                        <div style="margin-top:10px; font-size:0.8rem; color:var(--gold); font-weight:bold;">${op.status}</div>
                    </div>
                `;
            });
            document.getElementById('teaser-results').style.display = "block";
        }, 3200);
    } catch(e) { alert("Error al conectar con el Radar."); }
}

async function pagar(plan, precio) {
    try {
        const res = await fetch('/api/generar_pago', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ plan: plan, precio: precio })
        });
        const data = await res.json();
        if(data.init_point) window.location.href = data.init_point;
        else alert("Error al generar pago.");
    } catch(e) { alert("Error de conexión."); }
}
</script>
</body>
</html>
